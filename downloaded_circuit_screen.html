<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Séance Circuit Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f29e0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#09090b", // Deep black requested
                        "card-dark": "#18181b", // Zinc 900
                        "input-dark": "#27272a", // Zinc 800
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "glow": "0 0 20px -5px rgba(242, 158, 13, 0.5)",
                        "glow-lg": "0 0 30px -5px rgba(242, 158, 13, 0.6)",
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #09090b;
        }
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Ambient glow background */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(242, 158, 13, 0.15) 0%, rgba(9, 9, 11, 0) 70%);
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col overflow-hidden relative selection:bg-primary/30 selection:text-primary">
<!-- Ambient background glow -->
<div class="ambient-glow"></div>
<!-- Header -->
<header class="flex items-center justify-between px-4 pt-6 pb-2 z-10 relative">
<button class="flex items-center justify-center size-10 rounded-full bg-input-dark text-slate-300 hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-0.5 rounded-full bg-primary/20 text-primary text-[10px] font-bold tracking-wider uppercase border border-primary/20">Circuit</span>
</div>
<span class="text-sm font-medium text-slate-400">Tour 2/4</span>
</div>
<button class="flex items-center justify-center size-10 rounded-full bg-input-dark text-slate-300 hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">more_horiz</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative z-10 px-4 pt-2 pb-24 overflow-y-auto no-scrollbar">
<!-- Exercise Title -->
<div class="text-center mb-4">
<h1 class="text-3xl font-bold tracking-tight text-white mb-1">Kettlebell Swings</h1>
</div>
<!-- Video Player Section -->
<div class="relative aspect-video w-full rounded-xl overflow-hidden bg-zinc-900 shadow-lg ring-1 ring-white/10 mb-6 group">
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Athlete performing kettlebell swing in dark gym setting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBaoKlVm8N_M29MYdG3hYDjzRtbdkj33t6b8CpPZ6TfVPMNbwT4JKHeVGKExBSOgxAmVaZLXMSwDttfChLT_kL0x-euVT77EZxpjPlIPFezLrwaIRP8VcjJTp3zeoGjPjLgeRrw28xWS9O6RJmKe3KphXuh7V288SoTcuw8M1eJTWRc4hHxZzmC-aulq78eWDpJUei_iZPQu9n8ej2EmStMtS1EiddjI95HdjcmPZ_JjK9tRYN8szsUomN9wDBnaByJ9fjOay6mzPU');"></div>
<!-- Gradient Overlay for Video Controls -->
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-4">
<div class="flex justify-between items-end">
<div class="flex gap-2">
<span class="material-symbols-outlined text-white/80" style="font-size: 20px;">volume_up</span>
</div>
<span class="material-symbols-outlined text-white/80" style="font-size: 20px;">fullscreen</span>
</div>
</div>
<!-- Play Button Overlay -->
<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
<div class="bg-black/40 backdrop-blur-sm p-3 rounded-full text-white">
<span class="material-symbols-outlined" style="font-size: 32px;">play_arrow</span>
</div>
</div>
</div>
<!-- Block Timer -->
<div class="flex flex-col items-center justify-center mb-6">
<div class="text-6xl font-black text-primary tabular-nums tracking-tight drop-shadow-[0_0_15px_rgba(242,158,13,0.3)]">
                07:45
            </div>
<span class="text-xs font-medium text-primary/60 uppercase tracking-widest mt-1">Temps Restant</span>
</div>
<!-- Active Set Card (Glassmorphic) -->
<div class="glass-panel rounded-xl p-5 mb-4">
<div class="flex gap-4 mb-5">
<!-- Weight Input -->
<div class="flex-1 flex flex-col gap-2">
<label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Poids (kg)</label>
<div class="flex items-center justify-between bg-input-dark rounded-lg p-1 h-14 ring-1 ring-white/5 focus-within:ring-primary/50 transition-all">
<button class="size-10 flex items-center justify-center text-slate-400 hover:text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-xl font-bold text-white">24</span>
<button class="size-10 flex items-center justify-center text-primary hover:text-primary/80 active:scale-95 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Reps Input -->
<div class="flex-1 flex flex-col gap-2">
<label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Reps</label>
<div class="flex items-center justify-between bg-input-dark rounded-lg p-1 h-14 ring-1 ring-white/5 focus-within:ring-primary/50 transition-all">
<button class="size-10 flex items-center justify-center text-slate-400 hover:text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-xl font-bold text-white">12</span>
<button class="size-10 flex items-center justify-center text-primary hover:text-primary/80 active:scale-95 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
<!-- Next Up Preview -->
<div class="flex items-center gap-3 pt-4 border-t border-white/5">
<div class="flex-shrink-0 size-8 rounded bg-zinc-800 bg-cover bg-center" data-alt="Squat preparation thumbnail" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAyTpCVZYGlUtuxLDEvC60DN_C7KuOZt3AaefhwaNsQ4J8YqRbNVQn6SpjbgOhpaRqU-XhZNvgLrevEaajUzkQYmAkF5qWH-Vr8yiTMYs4wr_8WS2-H5Ap2ZRT3cI0bRWh2TBfWdRNxrEVV7azrdJ8M-ur3iZuAGfJBRPuxKYHZnZ3g2O9XZQZp5WXPmLgabCsxm1L2QesNu6HmHMcbQelPEZ4T6q_Avu_antFBX4OhDe6prSLlKfwsdsUwGTEwrZZsLRcF8RDRBhs');"></div>
<div class="flex flex-col">
<span class="text-[10px] text-slate-400 uppercase font-medium">Suivant</span>
<span class="text-sm text-slate-200 font-semibold truncate">Goblet Squats</span>
</div>
<div class="ml-auto text-slate-500">
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</div>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary text-background-dark font-bold text-lg py-4 px-6 rounded-xl shadow-glow hover:shadow-glow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span>Valider &amp; Suivant</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">check_circle</span>
</button>
</main>
<!-- Floating Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 w-full p-4 z-50 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent pt-8">
<div class="glass-panel rounded-full px-5 py-3 flex items-center justify-between shadow-2xl">
<!-- Prev Button -->
<button class="flex flex-col items-center justify-center gap-0.5 text-slate-400 hover:text-white w-12 group">
<span class="material-symbols-outlined group-active:-translate-x-1 transition-transform" style="font-size: 24px;">chevron_left</span>
<span class="text-[10px] font-medium opacity-0 group-hover:opacity-100 absolute -top-4 transition-opacity bg-zinc-800 px-1.5 py-0.5 rounded">Préc.</span>
</button>
<!-- Total Session Time -->
<div class="flex flex-col items-center gap-0.5">
<div class="flex items-center gap-1.5 text-slate-200">
<span class="material-symbols-outlined text-primary" style="font-size: 18px; font-variation-settings: 'FILL' 1;">timer</span>
<span class="text-sm font-bold tracking-wide tabular-nums">14:20</span>
</div>
<span class="text-[10px] text-slate-500 font-medium">Total Session</span>
</div>
<!-- Next Button -->
<button class="flex flex-col items-center justify-center gap-0.5 text-slate-400 hover:text-white w-12 group">
<span class="material-symbols-outlined group-active:translate-x-1 transition-transform" style="font-size: 24px;">chevron_right</span>
<span class="text-[10px] font-medium opacity-0 group-hover:opacity-100 absolute -top-4 transition-opacity bg-zinc-800 px-1.5 py-0.5 rounded">Suiv.</span>
</button>
</div>
</div>
</body></html>

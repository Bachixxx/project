<html lang="fr">

<head>

  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- OneSignal SDK removed: Loaded conditionally in NotificationsContext for Web only -->

  <title>Coachency | L'App Tout-en-Un pour les Coachs Sportifs 🚀</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://coachency.app/" />
  <meta property="og:title" content="Coachency | L'App Tout-en-Un pour les Coachs Sportifs 🚀" />

  <meta property="og:image" content="https://coachency.app/logo.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Coachency | L'App Tout-en-Un pour les Coachs Sportifs 🚀" />
  <meta property="twitter:description"
    content="Ne perdez plus de temps avec l'admin. Coachency centralise tout : clients, programmes, paiements et suivis. Testez l'app qui fait décoller votre business !" />
  <meta property="twitter:image" content="https://coachency.app/logo.png" />
</head>
